apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.6.0
    helm:
      releaseName: gitea
      values: |
        service:
          http:
            type: LoadBalancer

        gitea:
          admin:
            username: admin
            password: ChangeMe123!
            email: admin@example.com

        postgresql-ha:
          enabled: false

        postgresql:
          enabled: true

        redis-cluster:
          enabled: false

        redis:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: gitea

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true